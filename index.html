<!DOCTYPE html>
<html>
<head><title>Backend Test</title></head>
<body>
<h2>Test Enrollment (POST)</h2>
<label>Course ID: <input id="courseId" value="6a08901d6c9b6377ac2edd72" size="30"></label><br>
<label>Access Token: <input id="token" size="80"></label><br>
<button onclick="testEnroll()">Enroll</button>
<pre id="result1"></pre>

<h2>Test Registration with Referral Code (POST)</h2>
<label>Referral Code: <input id="refCode" value="GW50JLPC"></label><br>
<button onclick="testRegister()">Register</button>
<pre id="result2"></pre>

<script>
async function testEnroll() {
  const courseId = document.getElementById('courseId').value;
  const token = document.getElementById('token').value;
  const res = await fetch(`https://changex-backend-1.onrender.com/api/v1/courses/${courseId}/enroll`, {
    method: 'POST',
    headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' }
  });
  const data = await res.json();
  document.getElementById('result1').textContent = JSON.stringify(data, null, 2);
}
async function testRegister() {
  const refCode = document.getElementById('refCode').value;
  const email = 'test' + Date.now() + '@example.com';
  const res = await fetch('https://changex-backend-1.onrender.com/api/v1/auth/register', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      email, password: 'Test1234!', firstName: 'Test', lastName: 'User', referralCode: refCode
    })
  });
  const data = await res.json();
  document.getElementById('result2').textContent = JSON.stringify(data, null, 2);
}
</script>
</body>
</html>
