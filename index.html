<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>Quick Register Test</title></head>
<body>
  <h2>Register</h2>
  <input id="fname" placeholder="First Name"><br>
  <input id="lname" placeholder="Last Name"><br>
  <input id="email" type="email" placeholder="Email"><br>
  <input id="pw" type="password" placeholder="Password"><br>
  <button onclick="register()">Register</button>
  <pre id="out"></pre>
  <script>
    const BASE = 'https://changex-backend-etfk.onrender.com/api/v1';
    async function register() {
      const body = {
        firstName: document.getElementById('fname').value,
        lastName: document.getElementById('lname').value,
        email: document.getElementById('email').value,
        password: document.getElementById('pw').value
      };
      try {
        const res = await fetch(BASE+'/auth/register', {
          method: 'POST',
          headers: {'Content-Type':'application/json'},
          body: JSON.stringify(body)
        });
        const data = await res.json();
        document.getElementById('out').textContent = JSON.stringify(data, null, 2);
      } catch(e) {
        document.getElementById('out').textContent = 'Error: ' + e.message;
      }
    }
  </script>
</body>
</html>
